<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
    <title>Classic Calculator</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link
        href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@400;500;600;700&family=Orbitron:wght@400;700&display=swap"
        rel="stylesheet" />
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div id="app">

        <!-- ═══════════════════════════════════════════ CALCULATOR -->
        <div id="calc-view" class="view active">

            <!-- Header -->
            <div class="hdr">
                <div class="rivet"></div>
                <span class="hdr-title">MECH·CALC</span>
                <div style="flex:1"></div>
                <button class="hdr-btn" onclick="showView('conv-home')" title="Converter">⊞</button>
                <button class="hdr-btn" onclick="toggleMenu()" title="Menu">⋮</button>
                <div class="rivet"></div>
            </div>

            <!-- Display -->
            <div id="calc-display">
                <div id="disp-prev"></div>
                <div id="disp-expr"></div>
                <div id="disp-main">0</div>
                <div class="mode-bar">
                    <div class="mode-tag" id="tag-deg">DEG</div>
                    <div class="mode-tag" id="tag-rad">RAD</div>
                    <div class="mode-tag" id="tag-inv">INV</div>
                </div>
            </div>

            <!-- Button Grid -->
            <div id="btn-grid"></div>

            <!-- Menu Dropdown -->
            <div id="menu-overlay" onclick="closeMenu()">
                <div id="menu-box" onclick="event.stopPropagation()">
                    <div class="menu-item" onclick="closeMenu(); showView('history')">Lịch sử</div>
                    <div class="menu-item" onclick="closeMenu(); showView('settings')">Cài đặt</div>
                </div>
            </div>
        </div>

        <!-- ═══════════════════════════════════════════ CONVERTER HOME -->
        <div id="conv-home" class="view">
            <div class="hdr">
                <button class="hdr-back" onclick="showView('calc-view')">←</button>
                <div class="rivet"></div>
                <span class="hdr-title">ĐƠN VỊ</span>
                <div class="rivet"></div>
            </div>
            <div id="conv-grid"></div>
        </div>

        <!-- ═══════════════════════════════════════════ UNIT CONVERTER -->
        <div id="conv-view" class="view">
            <div class="hdr">
                <button class="hdr-back" onclick="showView('conv-home')">←</button>
                <div class="rivet"></div>
                <span class="hdr-title" id="conv-title">ĐƠN VỊ</span>
                <div class="rivet"></div>
            </div>
            <div class="inner">
                <div class="panel">
                    <div class="panel-label">Từ</div>
                    <div class="chips" id="from-chips"></div>
                    <input class="conv-input" id="conv-input" placeholder="Nhập giá trị..." type="text"
                        oninput="doConvert()" autocomplete="off" />
                </div>
                <button class="swap-btn" onclick="swapUnits()">⇅</button>
                <div class="panel">
                    <div class="panel-label">Đến</div>
                    <div class="chips" id="to-chips"></div>
                    <div class="result-box">
                        <span class="result-val" id="conv-result">—</span>
                        <span class="result-unit" id="conv-result-unit"></span>
                    </div>
                </div>
                <div style="height:10px"></div>
            </div>
        </div>

        <!-- ═══════════════════════════════════════════ HISTORY -->
        <div id="history" class="view">
            <div class="hdr">
                <button class="hdr-back" onclick="showView('calc-view')">←</button>
                <div class="rivet"></div>
                <span class="hdr-title">LỊCH SỬ</span>
                <div style="flex:1"></div>
                <button class="hdr-btn" style="color:#ff7070;font-size:13px;font-weight:700;"
                    onclick="clearHistory()">XÓA TẤT CẢ</button>
            </div>
            <div id="hist-list"></div>
        </div>

        <!-- ═══════════════════════════════════════════ SETTINGS -->
        <div id="settings" class="view">
            <div class="hdr">
                <button class="hdr-back" onclick="showView('calc-view')">←</button>
                <div class="rivet"></div>
                <span class="hdr-title">CÀI ĐẶT</span>
            </div>
            <div id="settings-body">
                <div class="settings-section">Giao diện & Phản hồi</div>
                <div class="settings-card">
                    <div class="settings-row">
                        <span class="settings-row-label">Rung khi nhấn</span>
                        <label class="toggle"><input type="checkbox" checked id="s-vibrate" />
                            <div class="toggle-track"></div>
                            <div class="toggle-thumb"></div>
                        </label>
                    </div>
                    <div class="settings-row">
                        <span class="settings-row-label">Phân cách hàng nghìn</span>
                        <label class="toggle"><input type="checkbox" id="s-thousands" onchange="renderCalcBtns()" />
                            <div class="toggle-track"></div>
                            <div class="toggle-thumb"></div>
                        </label>
                    </div>
                </div>
                <div class="settings-section">Về ứng dụng</div>
                <div class="settings-card">
                    <div class="settings-row"><span class="settings-row-label">Tên</span><span
                            class="settings-row-val">Mechanic Calc</span></div>
                    <div class="settings-row"><span class="settings-row-label">Phiên bản</span><span
                            class="settings-row-val">1.0.0</span></div>
                    <div class="settings-row"><span class="settings-row-label">Chủ đề</span><span
                            class="settings-row-val">Steel Grey</span></div>
                </div>
            </div>
        </div>

    </div><!-- #app -->

    <script src="script.js"></script>
</body>

</html>
